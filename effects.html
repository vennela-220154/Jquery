<html>
<head>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <title>Effects</title>
    <style>
        #box {
          width: 300px;
          position: relative;
          display: block;
        }
      </style>
</head>
<body>
    <img id="box" src="rocket.gif">

    <br>
    
    <button id="show">Show</button>
    <button id="hide">Hide</button>
    <button id="toggle">Toggle</button>

    <button id="fadeIn">Fade In</button>
<button id="fadeOut">Fade Out</button>
<button id="fadeToggle">Fade Toggle</button>
<button id="fadeTo">Fade To</button>

<button id="slideDown">Slide Down</button>
<button id="slideUp">Slide Up</button>
<button id="slideToggle">Slide Toggle</button>
    <script>
        $(document).ready(function(){
        
          $("#show").click(function(){ $("#box").show(10000); });
          $("#hide").click(function(){ $("#box").hide(6000); });
          $("#toggle").click(function(){ $("#box").toggle(5000); });    



  $("#fadeIn").click(function(){ $("#box").fadeIn(2000); });
  $("#fadeOut").click(function(){ $("#box").fadeOut(2000); });
  $("#fadeToggle").click(function(){ $("#box").fadeToggle(2000); });
  $("#fadeTo").click(function(){ $("#box").fadeTo(2000,0.4); });


  $("#slideDown").click(function(){ $("#box").slideDown(2000); });
  $("#slideUp").click(function(){ $("#box").slideUp(2000); });
  $("#slideToggle").click(function(){ $("#box").slideToggle(2000); });

  $("#animate").click(function(){
    $("#box").animate({
      left: "200px",
      opacity: 0.5,
      width: "150px"
    }, 1000);
  });
        })    
    </script>

</body>
</html>
